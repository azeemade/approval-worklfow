name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  # ─── 1. Run full test suite before releasing ────────────────────────────────
  test:
    name: Test before release
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: ["8.1", "8.2", "8.3"]
        laravel: ["10.*", "11.*", "12.*"]
        exclude:
          - php: "8.1"
            laravel: "11.*"
          - php: "8.1"
            laravel: "12.*"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

  # ─── 2. Create the GitHub Release ───────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test  # only runs if all tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for changelog generation

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # auto-generates changelog from commits/PRs
          make_latest: true

  # ─── 3. Notify Packagist (optional — needs secrets configured) ──────────────
  packagist:
    name: Notify Packagist
    runs-on: ubuntu-latest
    needs: release
    # Only runs if PACKAGIST_TOKEN and PACKAGIST_USERNAME secrets are set
    if: ${{ vars.PACKAGIST_USERNAME != '' }}

    steps:
      - name: Trigger Packagist webhook
        run: |
          curl -XPOST \
            -H "content-type:application/json" \
            "https://packagist.org/api/update-package?username=${{ vars.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -d "{\"repository\":{\"url\":\"https://github.com/${{ github.repository }}\"}}"
